services:
  test-db:
    image: postgres:16-alpine
    container_name: rsync-viewer-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rsync_viewer_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: rsync-viewer-test
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@test-db:5432/rsync_viewer_test
      DEBUG: "true"
      DEFAULT_API_KEY: test-api-key
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
      - ./tests:/app/tests:ro
      - ./pytest.ini:/app/pytest.ini:ro
      - ./.env.example:/app/.env.example:ro
