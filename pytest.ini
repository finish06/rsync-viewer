[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Smoke tests that run against a live instance (no DB fixtures)
addopts = -v --tb=short --ignore=tests/e2e --ignore=tests/smoke
