[mypy]
python_version = 3.11
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

# SQLModel/SQLAlchemy column expressions produce false positives for .desc(),
# == None comparisons, and Optional field operations. Suppress per-module.
[mypy-app.api.endpoints.*]
disable_error_code = attr-defined, arg-type

[mypy-app.main]
disable_error_code = attr-defined, assignment, operator, var-annotated
