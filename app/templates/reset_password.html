<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Rsync Log Viewer</title>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme') || 'system';
                var dark = theme === 'dark' || (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (dark) document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
        }
        .auth-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            padding: 2rem;
        }
        .auth-card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-card .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted, #888);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-field {
            margin-bottom: 1rem;
        }
        .auth-field label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .auth-field input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color, #d0d0d0);
            border-radius: 4px;
            font-size: 0.875rem;
            background: var(--input-bg, #fff);
            color: var(--text-color, #333);
            box-sizing: border-box;
        }
        .auth-field input:focus {
            outline: none;
            border-color: var(--accent-color, #4a90d9);
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }
        .auth-field .field-hint {
            font-size: 0.75rem;
            color: var(--text-muted, #888);
            margin-top: 0.25rem;
        }
        .auth-submit {
            width: 100%;
            padding: 0.625rem;
            background: var(--accent-color, #4a90d9);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .auth-submit:hover {
            opacity: 0.9;
        }
        .auth-message {
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .auth-message.success {
            background: var(--success-bg, #f0fdf4);
            color: var(--success-color, #16a34a);
            display: block;
        }
        .auth-message.error {
            background: var(--error-bg, #fef2f2);
            color: var(--error-color, #dc2626);
            display: block;
        }
        .auth-links {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        .auth-links a {
            color: var(--accent-color, #4a90d9);
            text-decoration: none;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Set New Password</h1>
            <p class="subtitle">Enter your new password below.</p>

            <div id="reset-message" class="auth-message"></div>

            <form id="reset-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" id="reset-token" value="{{ token }}">

                <div class="auth-field">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new_password" required
                           minlength="8" autocomplete="new-password" autofocus>
                    <div class="field-hint">Min 8 characters, must include uppercase, lowercase, and digit</div>
                </div>

                <div class="auth-field">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" required
                           minlength="8" autocomplete="new-password">
                </div>

                <button type="submit" class="auth-submit">Reset Password</button>
            </form>

            <div class="auth-links">
                <p><a href="/login">Back to login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const msgDiv = document.getElementById('reset-message');
            msgDiv.className = 'auth-message';
            msgDiv.style.display = 'none';

            const newPassword = form.querySelector('#new-password').value;
            const confirmPassword = form.querySelector('#confirm-password').value;
            const token = document.getElementById('reset-token').value;

            if (newPassword !== confirmPassword) {
                msgDiv.textContent = 'Passwords do not match.';
                msgDiv.className = 'auth-message error';
                return;
            }

            if (!token) {
                msgDiv.textContent = 'Missing reset token. Please use the link from your email.';
                msgDiv.className = 'auth-message error';
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/password-reset/confirm', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });

                if (response.ok) {
                    msgDiv.textContent = 'Password has been reset successfully. You can now log in.';
                    msgDiv.className = 'auth-message success';
                    form.style.display = 'none';
                } else {
                    const data = await response.json();
                    msgDiv.textContent = data.detail || 'Failed to reset password. The token may be expired or already used.';
                    msgDiv.className = 'auth-message error';
                }
            } catch (err) {
                msgDiv.textContent = 'Network error. Please try again.';
                msgDiv.className = 'auth-message error';
            }
        });
    </script>
</body>
</html>
