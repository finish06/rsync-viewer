<div class="modal-backdrop" onclick="this.remove()">
    <div class="modal webhook-modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>API Key Created</h2>
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">&times;</button>
        </div>
        <div class="modal-body">
            <div style="margin-bottom: 1rem; padding: 0.75rem; background: #f0fdf4; border: 1px solid #86efac; border-radius: 0.375rem; color: #166534;">
                <strong>{{ key_name }}</strong> created successfully.
            </div>
            <div style="margin-bottom: 0.5rem;">
                <label class="settings-label">Your API Key</label>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <code id="api-key-value" style="flex: 1; padding: 0.5rem; background: var(--bg-secondary, #f3f4f6); border: 1px solid var(--border-color, #d1d5db); border-radius: 0.375rem; font-size: 0.75rem; word-break: break-all;">{{ raw_key }}</code>
                    <button type="button" class="btn btn-small" onclick="navigator.clipboard.writeText(document.getElementById('api-key-value').textContent).then(() => this.textContent = 'Copied!')">Copy</button>
                </div>
            </div>
            <div style="margin-bottom: 1rem; padding: 0.5rem; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 0.375rem; color: #92400e; font-size: 0.875rem;">
                This key will only be shown once. Store it securely.
            </div>
            <div style="font-size: 0.875rem; color: var(--text-secondary, #6b7280);">
                <p><strong>Role:</strong> {{ effective_role }}</p>
            </div>
            <div class="form-actions" style="display: flex; justify-content: flex-end; margin-top: 1rem;">
                <button type="button" class="btn btn-small btn-test"
                        onclick="this.closest('.modal-backdrop').remove()">Done</button>
            </div>
        </div>
    </div>
</div>
