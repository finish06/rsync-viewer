<div class="changelog-detail" style="padding: 0.75rem 1rem 1rem 1.5rem;">
    {% for section_name, items in version.sections.items() %}
    <div class="changelog-section" style="margin-bottom: 0.75rem;">
        <h4 style="font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem;">{{ section_name }}</h4>
        <ul style="margin: 0; padding-left: 1.25rem;">
            {% for item in items %}
            <li style="font-size: 0.875rem; margin-bottom: 0.125rem;">{{ item }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endfor %}
</div>
