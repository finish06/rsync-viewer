{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <section class="filters">
        <form id="filter-form" hx-trigger="submit">
            <div class="filter-group">
                <label for="source_name">Source:</label>
                <select name="source_name" id="source_name">
                    <option value="">All Sources</option>
                    {% for source in sources %}
                    <option value="{{ source }}">{{ source }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="filter-group">
                <label for="start_date">From:</label>
                <input type="date" name="start_date" id="start_date">
            </div>

            <div class="filter-group">
                <label for="end_date">To:</label>
                <input type="date" name="end_date" id="end_date">
            </div>

            <div class="filter-group">
                <label for="show_dry_run">Dry Runs:</label>
                <select name="show_dry_run" id="show_dry_run">
                    <option value="hide" selected>Hide</option>
                    <option value="show">Show</option>
                    <option value="only">Only Dry Runs</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="hide_empty">Empty Runs:</label>
                <select name="hide_empty" id="hide_empty">
                    <option value="hide" selected>Hide</option>
                    <option value="show">Show</option>
                    <option value="only">Only Empty</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Filter</button>
            <button type="button" class="btn btn-secondary" onclick="resetFilters()">Reset</button>
        </form>
    </section>

    <section class="charts-wrapper">
        <div id="charts-container"
             hx-get="/htmx/charts?show_dry_run=hide&hide_empty=hide"
             hx-trigger="load">
            <div class="charts-loading">Loading charts...</div>
        </div>
    </section>

    <section class="sync-logs">
        <div id="sync-table"
             hx-get="/htmx/sync-table?show_dry_run=hide&hide_empty=hide"
             hx-trigger="load"
             hx-indicator="#loading">
            <div class="loading">Loading...</div>
        </div>
        <div id="loading" class="htmx-indicator">Loading...</div>
    </section>
</div>

<script>
document.getElementById('filter-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const params = new URLSearchParams(formData).toString();

    // Update both charts and table
    htmx.ajax('GET', '/htmx/charts?' + params, '#charts-container');
    htmx.ajax('GET', '/htmx/sync-table?' + params, '#sync-table');
});

function resetFilters() {
    document.getElementById('filter-form').reset();
    const defaultParams = 'show_dry_run=hide&hide_empty=hide';
    htmx.ajax('GET', '/htmx/charts?' + defaultParams, '#charts-container');
    htmx.ajax('GET', '/htmx/sync-table?' + defaultParams, '#sync-table');
}
</script>
{% endblock %}
