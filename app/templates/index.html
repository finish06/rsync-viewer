{% extends "base.html" %}

{% block content %}
<div class="dashboard">
    <div class="dashboard-tabs">
        <button class="dashboard-tab active" data-tab="syncs" onclick="switchTab('syncs', this)">Sync Logs</button>
        <button class="dashboard-tab" data-tab="analytics" onclick="switchTab('analytics', this)">Analytics</button>
        <button class="dashboard-tab" data-tab="notifications" onclick="switchTab('notifications', this)">Notifications</button>
    </div>

    <div id="syncs-tab" class="tab-content">
        <section class="filters">
            <div class="quick-select">
                <button class="quick-select-btn active" data-range="7d" onclick="selectRange('7d', this)">Last 7 Days</button>
                <button class="quick-select-btn" data-range="30d" onclick="selectRange('30d', this)">Last 30 Days</button>
                <button class="quick-select-btn" data-range="max" onclick="selectRange('max', this)">Max</button>
                <button class="quick-select-btn" data-range="custom" onclick="selectRange('custom', this)">Custom</button>
            </div>

            <form id="filter-form" hx-trigger="submit">
                <div class="filter-group">
                    <label for="source_name">Source:</label>
                    <select name="source_name" id="source_name">
                        <option value="">All Sources</option>
                        {% for source in sources %}
                        <option value="{{ source }}">{{ source }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="filter-group">
                    <label for="show_dry_run">Dry Runs:</label>
                    <select name="show_dry_run" id="show_dry_run">
                        <option value="hide" selected>Hide</option>
                        <option value="show">Show</option>
                        <option value="only">Only Dry Runs</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="hide_empty">Empty Runs:</label>
                    <select name="hide_empty" id="hide_empty">
                        <option value="hide" selected>Hide</option>
                        <option value="show">Show</option>
                        <option value="only">Only Empty</option>
                    </select>
                </div>

                {% if synthetic_monitoring_enabled %}
                <div class="filter-group">
                    <label for="synthetic">Synthetic:</label>
                    <select name="synthetic" id="synthetic">
                        <option value="hide" selected>Hide</option>
                        <option value="show">Show</option>
                        <option value="only">Only Synthetic</option>
                    </select>
                </div>
                {% endif %}

                <div class="filter-group date-filter" style="display: none;">
                    <label for="start_date">From:</label>
                    <input type="date" name="start_date" id="start_date">
                </div>

                <div class="filter-group date-filter" style="display: none;">
                    <label for="end_date">To:</label>
                    <input type="date" name="end_date" id="end_date">
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn btn-primary">Filter</button>
                    <button type="button" class="btn btn-secondary" onclick="resetFilters()">Reset</button>
                </div>

            </form>
        </section>

        <section class="sync-logs">
            <div id="sync-table"
                 hx-indicator="#loading">
                <div class="loading">Loading...</div>
            </div>
            <div id="loading" class="htmx-indicator">Loading...</div>
        </section>
    </div>

    <div id="analytics-tab" class="tab-content" style="display: none;">
        <div id="analytics-container">
            <div class="loading">Loading analytics...</div>
        </div>
    </div>

    <div id="notifications-tab" class="tab-content" style="display: none;">
        <div id="notifications-container"
             hx-indicator="#notif-loading">
            <div class="loading">Loading notifications...</div>
        </div>
        <div id="notif-loading" class="htmx-indicator">Loading...</div>
    </div>
</div>

<script>
var currentRange = '7d';
var analyticsLoaded = false;
var notificationsLoaded = false;

function switchTab(tab, btn) {
    // Update active tab button
    var tabs = document.querySelectorAll('.dashboard-tab');
    tabs.forEach(function(t) { t.classList.remove('active'); });
    if (btn) btn.classList.add('active');

    // Show/hide tab content
    document.getElementById('syncs-tab').style.display = (tab === 'syncs') ? '' : 'none';
    document.getElementById('analytics-tab').style.display = (tab === 'analytics') ? '' : 'none';
    document.getElementById('notifications-tab').style.display = (tab === 'notifications') ? '' : 'none';

    // Load analytics on first view
    if (tab === 'analytics' && !analyticsLoaded) {
        htmx.ajax('GET', '/htmx/analytics', '#analytics-container');
        analyticsLoaded = true;
    }

    // Load notifications on first view
    if (tab === 'notifications' && !notificationsLoaded) {
        htmx.ajax('GET', '/htmx/notifications', '#notifications-container');
        notificationsLoaded = true;
    }
}

function getFilterParams() {
    var params = new URLSearchParams();
    var source = document.getElementById('source_name').value;
    if (source) params.set('source_name', source);
    params.set('show_dry_run', document.getElementById('show_dry_run').value);
    params.set('hide_empty', document.getElementById('hide_empty').value);
    var syntheticEl = document.getElementById('synthetic');
    if (syntheticEl) params.set('synthetic', syntheticEl.value);
    return params;
}

function applyDateRange(range, params) {
    if (range === '7d' || range === '30d') {
        var days = range === '7d' ? 7 : 30;
        var now = new Date();
        var start = new Date(now);
        start.setDate(start.getDate() - days);
        params.set('start_date', start.toISOString());
        params.set('end_date', now.toISOString());
    } else if (range === 'max') {
        params.set('limit', '50');
    } else if (range === 'custom') {
        var startDate = document.getElementById('start_date').value;
        var endDate = document.getElementById('end_date').value;
        if (startDate) params.set('start_date', startDate);
        if (endDate) params.set('end_date', endDate);
    }
}

function fetchDashboard(params) {
    htmx.ajax('GET', '/htmx/sync-table?' + params.toString(), '#sync-table');
}

function selectRange(range, btn) {
    currentRange = range;

    // Update active button
    var buttons = document.querySelectorAll('.quick-select-btn');
    buttons.forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    else {
        var target = document.querySelector('[data-range="' + range + '"]');
        if (target) target.classList.add('active');
    }

    // Show/hide date pickers
    var dateFilters = document.querySelectorAll('.date-filter');
    dateFilters.forEach(function(el) {
        el.style.display = (range === 'custom') ? '' : 'none';
    });

    var params = getFilterParams();
    applyDateRange(range, params);
    fetchDashboard(params);
}

document.getElementById('filter-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var params = getFilterParams();
    applyDateRange(currentRange, params);
    fetchDashboard(params);
});

function resetFilters() {
    document.getElementById('filter-form').reset();
    selectRange('7d');
}

// Default: load with Last 7 Days on page load
document.addEventListener('DOMContentLoaded', function() {
    selectRange('7d');

    // Handle ?tab= query param for deep linking
    var params = new URLSearchParams(window.location.search);
    var tab = params.get('tab');
    if (tab === 'analytics' || tab === 'notifications') {
        var btn = document.querySelector('[data-tab="' + tab + '"]');
        switchTab(tab, btn);
    }
});
</script>
{% endblock %}
