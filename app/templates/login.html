<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rsync Log Viewer</title>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme') || 'system';
                var dark = theme === 'dark' || (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (dark) document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
        }
        .auth-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            padding: 2rem;
        }
        .auth-card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .auth-field {
            margin-bottom: 1rem;
        }
        .auth-field label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .auth-field input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color, #d0d0d0);
            border-radius: 4px;
            font-size: 0.875rem;
            background: var(--input-bg, #fff);
            color: var(--text-color, #333);
            box-sizing: border-box;
        }
        .auth-field input:focus {
            outline: none;
            border-color: var(--accent-color, #4a90d9);
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }
        .auth-submit {
            width: 100%;
            padding: 0.625rem;
            background: var(--accent-color, #4a90d9);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .auth-submit:hover {
            opacity: 0.9;
        }
        .auth-error {
            background: var(--error-bg, #fef2f2);
            color: var(--error-color, #dc2626);
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .auth-error.visible {
            display: block;
        }
        .auth-links {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        .auth-links a {
            color: var(--accent-color, #4a90d9);
            text-decoration: none;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Log In</h1>

            {% if error_message %}
            <div class="auth-error" style="display: block;">{{ error_message }}</div>
            {% else %}
            <div id="login-error" class="auth-error"></div>
            {% endif %}

            {% if success_message %}
            <div style="background: var(--success-bg, #f0fdf4); color: var(--success-color, #16a34a); padding: 0.75rem; border-radius: 4px; font-size: 0.875rem; margin-bottom: 1rem;">
                {{ success_message }}
            </div>
            {% endif %}

            <form id="login-form" method="post" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                {% if return_url %}
                <input type="hidden" name="return_url" value="{{ return_url }}">
                {% endif %}

                <div class="auth-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>

                <div class="auth-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <button type="submit" class="auth-submit">Log In</button>
            </form>

            <div class="auth-links">
                <p>Don't have an account? <a href="/register">Register</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.remove('visible');

            const username = form.querySelector('#username').value;
            const password = form.querySelector('#password').value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams({
                        username: username,
                        password: password,
                        csrf_token: form.querySelector('[name=csrf_token]').value,
                        return_url: form.querySelector('[name=return_url]')?.value || ''
                    })
                });

                if (response.redirected) {
                    window.location.href = response.url;
                } else if (response.ok) {
                    const returnUrl = form.querySelector('[name=return_url]')?.value || '/';
                    window.location.href = returnUrl;
                } else {
                    const text = await response.text();
                    // Re-render the page with error from server
                    document.open();
                    document.write(text);
                    document.close();
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.add('visible');
            }
        });
    </script>
</body>
</html>
