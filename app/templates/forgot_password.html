<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Rsync Log Viewer</title>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme') || 'system';
                var dark = theme === 'dark' || (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (dark) document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
        }
        .auth-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            padding: 2rem;
        }
        .auth-card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-card .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted, #888);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-field {
            margin-bottom: 1rem;
        }
        .auth-field label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .auth-field input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color, #d0d0d0);
            border-radius: 4px;
            font-size: 0.875rem;
            background: var(--input-bg, #fff);
            color: var(--text-color, #333);
            box-sizing: border-box;
        }
        .auth-field input:focus {
            outline: none;
            border-color: var(--accent-color, #4a90d9);
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }
        .auth-submit {
            width: 100%;
            padding: 0.625rem;
            background: var(--accent-color, #4a90d9);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .auth-submit:hover {
            opacity: 0.9;
        }
        .auth-message {
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .auth-message.success {
            background: var(--success-bg, #f0fdf4);
            color: var(--success-color, #16a34a);
            display: block;
        }
        .auth-message.error {
            background: var(--error-bg, #fef2f2);
            color: var(--error-color, #dc2626);
            display: block;
        }
        .auth-links {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        .auth-links a {
            color: var(--accent-color, #4a90d9);
            text-decoration: none;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Reset Password</h1>
            <p class="subtitle">Enter your email address and we'll send you a reset link.</p>

            <div id="reset-message" class="auth-message"></div>

            <form id="forgot-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="auth-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email" autofocus>
                </div>

                <button type="submit" class="auth-submit">Send Reset Link</button>
            </form>

            <div class="auth-links">
                <p><a href="/login">Back to login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const msgDiv = document.getElementById('reset-message');
            msgDiv.className = 'auth-message';
            msgDiv.style.display = 'none';

            const email = form.querySelector('#email').value;

            try {
                const response = await fetch('/api/v1/auth/password-reset/request', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();
                msgDiv.textContent = data.message || 'If an account with that email exists, a reset link has been sent.';
                msgDiv.className = 'auth-message success';
            } catch (err) {
                msgDiv.textContent = 'Network error. Please try again.';
                msgDiv.className = 'auth-message error';
            }
        });
    </script>
</body>
</html>
