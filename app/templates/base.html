<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rsync Log Viewer{% endblock %}</title>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme') || 'system';
                var dark = theme === 'dark' || (theme === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
                if (dark) document.documentElement.setAttribute('data-theme', 'dark');
            } catch (e) {}
        })();
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        document.addEventListener('htmx:configRequest', function(event) {
            var csrf = document.cookie.match('(^|;)\\s*csrf_token=([^;]+)');
            if (csrf) event.detail.headers['X-CSRF-Token'] = csrf[2];
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css?v={{ app_version }}">
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="/" style="text-decoration: none; color: inherit;">Rsync Log Viewer</a></h1>
            <nav class="header-nav">
                {% if user %}
                    {% if user.role in ['admin', 'operator'] %}
                    <a href="/settings">Settings</a>
                    {% endif %}
                    <span class="user-info">{{ user.username }} <span class="role-badge role-{{ user.role }}">{{ user.role }}</span></span>
                    <form method="post" action="/logout" style="display:inline;">
                        <button type="submit" class="logout-btn">Logout</button>
                    </form>
                {% else %}
                    <a href="/login">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <div id="modal-container"></div>
    <script src="/static/js/theme.js"></script>
</body>
</html>
