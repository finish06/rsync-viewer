name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.3.0

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Mypy
        run: mypy app/

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          docker compose -f docker-compose.dev.yml run --rm -e COVERAGE_FILE=/tmp/.coverage test \
            pytest tests/ --ignore=tests/e2e --ignore=tests/smoke --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  build-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="ghcr.io/finish06/rsync-viewer:latest"
          TAGS="$TAGS,ghcr.io/finish06/rsync-viewer:sha-${{ github.sha }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="$TAGS,ghcr.io/finish06/rsync-viewer:${VERSION}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install httpx pytest

      - name: Start services
        run: docker compose -f docker-compose.dev.yml up -d --wait

      - name: Run smoke tests
        run: pytest tests/smoke/ -m smoke --override-ini="confcutdir=tests/smoke"
        env:
          SMOKE_TEST_URL: http://localhost:8000

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down
