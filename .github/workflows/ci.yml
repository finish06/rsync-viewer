name: CI

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
  schedule:
    - cron: '0 9 * * 1'  # Monday 9 AM UTC — weekly dependency audit

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.3.0

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Mypy
        run: mypy app/

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests
        run: |
          docker compose -f docker-compose.dev.yml run --rm -e COVERAGE_FILE=/tmp/.coverage test \
            pytest tests/ --ignore=tests/e2e --ignore=tests/smoke --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and pip-audit
        run: pip install -r requirements.txt pip-audit

      - name: Run pip-audit
        run: pip-audit

  build-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, security-audit]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version for main
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          # Skip auto-tagging if HEAD already has a version tag
          HEAD_TAGS=$(git tag --points-at HEAD | grep -E '^v[0-9]' || true)
          if [ -n "$HEAD_TAGS" ]; then
            echo "HEAD already tagged: $HEAD_TAGS — skipping auto-bump"
            echo "version=$HEAD_TAGS" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Determine bump type from conventional commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            SUBJECTS=$(git log --pretty=format:"%s")
          else
            SUBJECTS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s")
          fi

          if echo "$SUBJECTS" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$SUBJECTS" | grep -qE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            PATCH=$((PATCH + 1))
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumping from $LATEST_TAG to $NEW_VERSION"

      - name: Create version tag
        if: github.ref == 'refs/heads/main' && steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push origin ${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/beta" ]]; then
            TAGS="ghcr.io/finish06/rsync-viewer:beta"
          else
            TAGS="ghcr.io/finish06/rsync-viewer:latest"
            TAGS="$TAGS,ghcr.io/finish06/rsync-viewer:${{ steps.version.outputs.version }}"
          fi
          TAGS="$TAGS,ghcr.io/finish06/rsync-viewer:sha-${{ github.sha }}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Determine app version
        id: app-version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/beta" ]]; then
            echo "version=beta" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: APP_VERSION=${{ steps.app-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install httpx pytest

      - name: Start services
        run: docker compose up -d --wait

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "App failed to start"
          docker compose logs app
          exit 1

      - name: Run smoke tests
        run: 'pytest tests/smoke/ -c /dev/null --noconftest --rootdir tests/smoke -o "markers=smoke: Smoke tests"'
        env:
          SMOKE_TEST_URL: http://localhost:8000

      - name: Cleanup
        if: always()
        run: docker compose down
