# Rsync Client — Push Mode
# Pushes files FROM a local directory TO a remote server on a cron schedule.
# Logs are automatically shipped to your Rsync Viewer instance.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose -f docker-compose.push.yml up -d

services:
  rsync-client:
    build: .
    container_name: rsync-push
    restart: unless-stopped
    env_file: .env
    environment:
      - SYNC_MODE=push
    volumes:
      # Local directory containing files to push to the remote server
      - ./data:/data:ro
      # SSH key for authenticating with the remote server
      - ~/.ssh/id_rsa:/home/rsync/.ssh/id_rsa:ro
